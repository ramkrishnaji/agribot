name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            ${{ secrets.HF_SPACE_URL }}/health
        
      - name: Log result
        run: echo "Space pinged at $(date)"
