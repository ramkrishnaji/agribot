name: Deploy AgriBot

on:
  push:
    branches: [main]

jobs:
  # ── Deploy backend to Hugging Face Spaces ───────────────────────────────
  deploy-backend:
    name: Deploy Backend → HF Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@agribot"
          git config --global user.name "AgriBot CI"

          # Clone the HF Space repo
          git clone https://rk787:${HF_TOKEN}@huggingface.co/spaces/rk787/agribot hf_space
          cd hf_space

          # Sync backend files into the HF Space root
          rsync -av --delete \
            --exclude='.git' \
            ../backend/ ./

          git add -A
          git diff --staged --quiet || git commit -m "Deploy: $(date '+%Y-%m-%d %H:%M')"
          git push

  # ── Deploy frontend to Vercel ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --token=$VERCEL_TOKEN --prod --yes
