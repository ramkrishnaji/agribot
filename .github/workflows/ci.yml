name: Deploy AgriBot

on:
  push:
    branches: [main]

jobs:
  # ── Deploy backend to Hugging Face Spaces ───────────────────────────────
  deploy-backend:
    name: Deploy Backend → HF Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@agribot"
          git config --global user.name "AgriBot CI"
          
          # Use a temporary directory for the push
          mkdir hf_push
          rsync -av --exclude='embeddings.pt' --exclude='__pycache__/' backend/ hf_push/
          cd hf_push
          
          git init
          git remote add origin https://rk787:${HF_TOKEN}@huggingface.co/spaces/rk787/agribot
          git checkout -b main
          git add -A
          git commit -m "Deploy: $(date '+%Y-%m-%d %H:%M')"
          git push origin main --force

  # ── Deploy frontend to Vercel ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build project
        working-directory: frontend
        run: npm run build

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --token=$VERCEL_TOKEN --prod --yes
